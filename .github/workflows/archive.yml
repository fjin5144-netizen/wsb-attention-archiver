name: Archive WSB attention data

on:
  schedule:
    - cron: '45 11 * * *'       # 11:45 UTC 早间保底快照
    - cron: '15 13-21 * * 1-5'  # 美股交易时段(周一至周五)每小时刷新
    - cron: '45 23 * * *'       # 23:45 UTC 收盘后定格为当日档案
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/archive.yml'

# 关键:同组运行串行排队,从根上消灭并发写数据的竞态
concurrency:
  group: wsb-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch snapshots
        run: python3 scripts/archive.py
      - name: Commit & push
        run: |
          git config user.name "wsb-archiver-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then echo "no changes"; exit 0; fi
          git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          # 先提交后变基:工作区永远干净,冲突标记不可能进文件;
          # 万一上游恰有新提交,-X theirs 让本次快照数据获胜;失败则响亮报错,绝不静默吞掉
          git pull --rebase -X theirs
          git push
