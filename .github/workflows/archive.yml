name: Archive WSB attention data

on:
  schedule:
    - cron: '45 11 * * *'   # 11:45 UTC fallback snapshot
    - cron: '45 23 * * *'   # 23:45 UTC canonical end-of-day snapshot (overwrites the day file)
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch snapshots
        run: python3 scripts/archive.py
      - name: Commit & push
        run: |
          git config user.name "wsb-archiver-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "no changes" || \
            (git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
